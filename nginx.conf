# =============================================================
# GeoSerra — Nginx Konfigürasyonu
# =============================================================
# Dosya konumu (VPS):
#   /etc/nginx/sites-available/geoserra
#   ln -s /etc/nginx/sites-available/geoserra /etc/nginx/sites-enabled/geoserra
# =============================================================

# geoserra.com — Frontend (port 3071)
server {
    listen 80;
    server_name geoserra.com www.geoserra.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name geoserra.com www.geoserra.com;

    ssl_certificate     /etc/letsencrypt/live/geoserra.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/geoserra.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:MozSSL:10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # API istekleri — Backend (port 8095)
    location /api/ {
        proxy_pass         http://127.0.0.1:8095;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 4m;
    }

    # PDF rapor dosyaları (backend storage)
    location /reports/ {
        proxy_pass         http://127.0.0.1:8095;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Statik varlıklar — logo, favicon vb. (backend /assets/)
    location /assets/ {
        proxy_pass         http://127.0.0.1:8095;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        expires            30d;
        add_header         Cache-Control "public, immutable";
    }

    location / {
        proxy_pass         http://127.0.0.1:3073;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

# api.geoserra.com — Backend (port 8095)
server {
    listen 80;
    server_name api.geoserra.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.geoserra.com;

    ssl_certificate     /etc/letsencrypt/live/api.geoserra.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.geoserra.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:MozSSL:10m;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Webhook body limit (Stripe imzalı payload)
    client_max_body_size 4m;

    gzip on;
    gzip_types application/json;

    location / {
        proxy_pass         http://127.0.0.1:8095;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# admin.geoserra.com — Admin paneli (port 3072)
server {
    listen 80;
    server_name admin.geoserra.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name admin.geoserra.com;

    ssl_certificate     /etc/letsencrypt/live/admin.geoserra.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.geoserra.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:MozSSL:10m;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Admin panelini sadece belirli IP'lerden erişilebilir yap (opsiyonel)
    # allow YOUR_IP;
    # deny all;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    location / {
        proxy_pass         http://127.0.0.1:3072;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
